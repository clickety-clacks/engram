name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.2.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          fi
          case "$tag" in
            v*.*.*) ;;
            *) echo "Release tag must look like vX.Y.Z, got: $tag" >&2; exit 1 ;;
          esac
          version="${tag#v}"
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          package_version=$(node -p "require('./package.json').version")
          if [ "$cargo_version" != "$version" ]; then
            echo "Cargo.toml version $cargo_version does not match tag $tag" >&2
            exit 1
          fi
          if [ "$package_version" != "$version" ]; then
            echo "package.json version $package_version does not match tag $tag" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: engram
            asset: engram-aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: engram
            asset: engram-x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: engram.exe
            asset: engram-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod 0755 "dist/${{ matrix.asset }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  github-release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    outputs:
      mac_sha: ${{ steps.sha.outputs.mac_sha }}
      linux_sha: ${{ steps.sha.outputs.linux_sha }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/engram-aarch64-apple-darwin/engram-aarch64-apple-darwin release/engram-aarch64-apple-darwin
          cp artifacts/engram-x86_64-unknown-linux-gnu/engram-x86_64-unknown-linux-gnu release/engram-x86_64-unknown-linux-gnu
          cp artifacts/engram-x86_64-pc-windows-msvc.exe/engram-x86_64-pc-windows-msvc.exe release/engram-x86_64-pc-windows-msvc.exe
          chmod 0755 release/engram-aarch64-apple-darwin release/engram-x86_64-unknown-linux-gnu

      - name: Compute Homebrew checksums
        id: sha
        run: |
          set -euo pipefail
          echo "mac_sha=$(sha256sum release/engram-aarch64-apple-darwin | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$(sha256sum release/engram-x86_64-unknown-linux-gnu | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          generate_release_notes: true
          files: |
            release/engram-aarch64-apple-darwin
            release/engram-x86_64-unknown-linux-gnu
            release/engram-x86_64-pc-windows-msvc.exe

  npm:
    needs: [validate, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate npm package
        run: npm run test:npm-package

      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  homebrew:
    needs: [validate, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate formula
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          MAC_SHA: ${{ needs.github-release.outputs.mac_sha }}
          LINUX_SHA: ${{ needs.github-release.outputs.linux_sha }}
          OUT: /tmp/engram.rb
        run: node .github/scripts/write-homebrew-formula.mjs

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: clickety-clacks/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          mkdir -p Formula
          cp /tmp/engram.rb Formula/engram.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/engram.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already current"
            exit 0
          fi
          git commit -m "engram ${{ needs.validate.outputs.tag }}"
          git push
